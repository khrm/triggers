apiVersion: tekton.dev/v1alpha1
kind: TaskRun
metadata:
  name: create-webhook
spec:
  taskRef:
    name: create-webhook
  inputs:
    params:
    - name: CreateCertificate
      value: "false"
    - name: CreateIngress
      value: "false"
    - name: CreateWebhook
      value: "true"
    - name: CreateEventListener
      value: "true"
    - name: EventListenerName
      value: listener
    - name: CertificateKeyPassphrase
      value: pass1
    - name: TriggerServiceAccount
      value: tekton-triggers-example-sa
    - name: CertificateSecretName
      value: secret1
    - name: ExternalUrl
      value: listener-test-triggers.apps.kbaig-007.devcluster.openshift.com
    - name: GithubOwner
      value: khrm
    - name: GithubRepo
      value: triggers
    - name: GithubSecretName
      value: githubsecret
    - name: GithubUrl
      value: github.com
    - name: TriggerBinding
      value: pipeline-binding
    - name: TriggerTemplate
      value: pipeline-template
  timeout: 1000s
  serviceAccount: default
